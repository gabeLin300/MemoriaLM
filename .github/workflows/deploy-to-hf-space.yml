name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing required secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_SPACE_ID" ]; then
            echo "Missing required secret: HF_SPACE_ID"
            exit 1
          fi
          if [[ "$HF_SPACE_ID" != */* ]]; then
            echo "HF_SPACE_ID must look like 'owner/space_name'"
            exit 1
          fi
          echo "::add-mask::$HF_TOKEN"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git remote remove hf-space || true
          git remote add hf-space "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force hf-space HEAD:main
